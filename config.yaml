version: "1.0"

# Data sources configuration
sources:
  - id: "claude-marketplaces"
    url: "https://raw.githubusercontent.com/Chat2AnyLLM/code-assistant-manager/main/code_assistant_manager/plugin_repos.json"
    format: "json"
    enabled: true
    priority: 1
    timeout: 30

  - id: "awesome-repo-configs"
    url: "https://raw.githubusercontent.com/Chat2AnyLLM/awesome-repo-configs/main/plugin_repos.json"
    enabled: true
    priority: 2
    timeout: 30

# Generation settings
generation:
  output_file: "README.md"
  include_marketplace_tables: true
  include_plugin_categories: true

# Logging settings
logging:
  level: "INFO"
